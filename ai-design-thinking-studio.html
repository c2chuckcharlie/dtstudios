<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The AI Design Thinking Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDEFE6;
  --paper-alt:#E1E5D8;
  --paper-deep:#D6DBC9;
  --card:#F6F7F1;
  --ink:#1B2620;
  --ink-soft:#4B564E;
  --ink-faint:#8A9288;
  --line: rgba(27,38,32,0.14);
  --line-strong: rgba(27,38,32,0.28);
  --emerald:#2F7A63;
  --emerald-deep:#1F5A48;
  --ochre:#D8952E;
  --brick:#B24A3C;
  --plum:#7A5BA6;
  --blue:#3B6FA0;

  --stage-empathize:#3B6FA0;
  --stage-define:#7A5BA6;
  --stage-ideate:#D8952E;
  --stage-prototype:#2F7A63;
  --stage-test:#B24A3C;

  --font-display:'Fraunces', serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;

  --radius: 14px;
  --shadow: 0 1px 2px rgba(27,38,32,0.06), 0 8px 24px rgba(27,38,32,0.08);
  --shadow-lg: 0 4px 10px rgba(27,38,32,0.08), 0 20px 48px rgba(27,38,32,0.14);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family: var(--font-body);
  background:
    radial-gradient(circle at 1px 1px, rgba(27,38,32,0.06) 1px, transparent 0) 0 0/22px 22px,
    var(--paper);
  color: var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
}
h1,h2,h3,h4{ font-family: var(--font-display); font-weight:600; margin:0; letter-spacing:-0.01em;}
p{margin:0;}
button{ font-family: var(--font-body); cursor:pointer; }
a{color:inherit;}
::selection{ background: rgba(47,122,99,0.25); }

.eyebrow{
  font-family: var(--font-mono);
  font-size:11px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color: var(--ink-faint);
}

/* ---------- App shell ---------- */
#app{ min-height:100vh; display:flex; flex-direction:column; }
.screen{ flex:1; width:100%; }
.wrap{ max-width:1080px; margin:0 auto; padding:0 24px; }

/* ---------- Welcome ---------- */
.welcome{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  padding:48px 24px;
}
.welcome::before{
  content:"";
  position:absolute; inset:0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='600'><g fill='none' stroke='%231B2620' stroke-opacity='0.05' stroke-width='1'><circle cx='300' cy='300' r='120'/><circle cx='300' cy='300' r='200'/><circle cx='300' cy='300' r='280'/><circle cx='60' cy='520' r='90'/><circle cx='560' cy='60' r='140'/></g></svg>");
  background-repeat:no-repeat; background-position: -60px -60px, right -80px top -80px;
  opacity:0.9; pointer-events:none;
}
.welcome-card{
  position:relative; z-index:1;
  max-width:720px; text-align:center;
}
.welcome-mark{
  font-family:var(--font-mono); font-size:12px; letter-spacing:0.22em; text-transform:uppercase;
  color: var(--emerald-deep); margin-bottom:22px; display:flex; align-items:center; justify-content:center; gap:10px;
}
.welcome-mark::before,.welcome-mark::after{ content:""; width:34px; height:1px; background: var(--line-strong); }
.welcome h1{
  font-size: clamp(40px, 7vw, 68px); line-height:1.02; margin-bottom:18px;
}
.welcome h1 em{ font-style: italic; color: var(--emerald-deep); }
.welcome .sub{
  font-size:19px; color: var(--ink-soft); line-height:1.55; max-width:520px; margin:0 auto 40px;
}
.welcome .sub b{ color:var(--ink); font-weight:600; }
.trail-hero{ margin: 8px auto 40px; max-width:560px; }
.welcome-actions{ display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }

.btn{
  font-size:14.5px; font-weight:600; padding:13px 22px; border-radius:999px; border:1.5px solid var(--ink);
  background: var(--ink); color: var(--paper); transition: transform .15s ease, box-shadow .15s ease;
  display:inline-flex; align-items:center; gap:8px;
}
.btn:hover{ transform: translateY(-1px); box-shadow: var(--shadow); }
.btn:active{ transform: translateY(0); }
.btn.secondary{ background:transparent; color:var(--ink); border:1.5px solid var(--line-strong); }
.btn.secondary:hover{ border-color: var(--ink); }
.btn.ghost{ background:transparent; border:1.5px solid transparent; color: var(--ink-soft); padding:13px 16px;}
.btn.ghost:hover{ color:var(--ink); }
.btn.small{ padding:8px 14px; font-size:13px; border-radius:10px; }
.btn:disabled{ opacity:0.45; cursor:not-allowed; transform:none; box-shadow:none; }
.btn.stagecolor{ background: var(--stage-color, var(--emerald)); border-color: var(--stage-color, var(--emerald)); color:#fff; }

/* ---------- Header / trail nav ---------- */
.topbar{
  position:sticky; top:0; z-index:40;
  background: rgba(237,239,230,0.88); backdrop-filter: blur(8px);
  border-bottom:1px solid var(--line);
}
.topbar-inner{ max-width:1080px; margin:0 auto; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; gap:20px;}
.brand{ display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:600; font-size:17px; }
.brand .dot{ width:9px; height:9px; border-radius:50%; background:var(--emerald); box-shadow:0 0 0 3px rgba(47,122,99,0.18);}
.stat-pill{
  font-family: var(--font-mono); font-size:12px; padding:6px 12px; border-radius:999px;
  background: var(--card); border:1px solid var(--line); display:flex; align-items:center; gap:6px; white-space:nowrap;
}
.header-stats{ display:flex; gap:8px; align-items:center; }

.trailbar{ padding:14px 24px 18px; max-width:1080px; margin:0 auto; }
.trail-svg{ width:100%; height:auto; display:block; }
.trail-node-label{ font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; }

/* ---------- Cards / templates ---------- */
.grid{ display:grid; gap:16px; }
.grid.cols-2{ grid-template-columns: repeat(2, 1fr); }
.grid.cols-3{ grid-template-columns: repeat(3, 1fr); }
@media (max-width:760px){ .grid.cols-2, .grid.cols-3{ grid-template-columns: 1fr; } }

.card{
  background: var(--card); border:1px solid var(--line); border-radius: var(--radius);
  box-shadow: var(--shadow); padding:22px;
}
.field-card{
  background: var(--card);
  border:1px solid var(--line);
  border-radius: var(--radius);
  padding: 26px 28px;
  box-shadow: var(--shadow);
  position:relative;
}
.field-card::before{
  content:""; position:absolute; left:14px; right:14px; top:6px; bottom:-6px;
  border:1px solid var(--line); border-radius: var(--radius); z-index:-1; opacity:0.5;
}

.tpl-card{
  background: var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px;
  cursor:pointer; transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  display:flex; flex-direction:column; gap:6px; text-align:left; position:relative;
}
.tpl-card:hover{ transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--line-strong); }
.tpl-card.done{ border-color: var(--stage-color); }
.tpl-card .tpl-icon{ font-size:22px; }
.tpl-card .tpl-name{ font-weight:600; font-size:14.5px; }
.tpl-card .tpl-blurb{ font-size:12.5px; color:var(--ink-soft); line-height:1.4; }
.tpl-check{
  position:absolute; top:12px; right:12px; width:20px; height:20px; border-radius:50%;
  background: var(--stage-color); color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px;
}

label{ font-size:12.5px; font-weight:600; color:var(--ink-soft); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em; font-family:var(--font-mono); }
input[type=text], input[type=number], textarea, select{
  width:100%; font-family:var(--font-body); font-size:14.5px; color:var(--ink);
  background:#fff; border:1.5px solid var(--line); border-radius:10px; padding:11px 13px;
  outline:none; transition:border-color .12s ease;
}
input[type=text]:focus, textarea:focus, select:focus{ border-color: var(--emerald); }
textarea{ resize:vertical; min-height:90px; line-height:1.5; }
.field{ margin-bottom:16px; }

.ai-box{
  background: linear-gradient(180deg, rgba(47,122,99,0.06), rgba(47,122,99,0.02));
  border:1px dashed rgba(47,122,99,0.4); border-radius:12px; padding:16px 18px; margin-top:10px;
  font-size:14px; line-height:1.6; white-space:pre-wrap;
}
.ai-box .ai-label{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--emerald-deep); margin-bottom:8px; display:flex; align-items:center; gap:6px;}
.spinner{ width:14px; height:14px; border-radius:50%; border:2px solid rgba(47,122,99,0.25); border-top-color: var(--emerald); animation:spin .7s linear infinite; display:inline-block; }
@keyframes spin{ to{ transform: rotate(360deg); } }

.chip{ font-family:var(--font-mono); font-size:11.5px; padding:4px 10px; border-radius:999px; background:var(--paper-alt); border:1px solid var(--line); display:inline-flex; align-items:center; gap:5px; color:var(--ink-soft); }
.chip-row{ display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }

.section-title{ display:flex; align-items:baseline; gap:12px; margin-bottom:6px; }
.section-title h2{ font-size:30px; }
.section-sub{ color:var(--ink-soft); font-size:15px; line-height:1.55; max-width:640px; margin-bottom:26px; }

.stage-badge{
  font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:0.1em;
  padding:5px 11px; border-radius:999px; color:#fff; background: var(--stage-color);
}

/* progress bar */
.progressbar{ height:8px; border-radius:999px; background: var(--paper-deep); overflow:hidden; }
.progressbar > div{ height:100%; background: var(--stage-color, var(--emerald)); transition: width .4s ease; }

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background: rgba(27,38,32,0.38); backdrop-filter: blur(2px);
  display:flex; align-items:flex-start; justify-content:center; z-index:100; padding:40px 20px; overflow-y:auto;
}
.modal{
  background: var(--paper); border-radius:18px; max-width:720px; width:100%;
  box-shadow: var(--shadow-lg); border:1px solid var(--line); animation: modalIn .18s ease;
}
@keyframes modalIn{ from{ opacity:0; transform: translateY(8px) scale(0.99);} to{opacity:1; transform:none;} }
.modal-head{ padding:22px 26px; border-bottom:1px solid var(--line); display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
.modal-body{ padding:22px 26px; }
.modal-foot{ padding:18px 26px; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;}
.modal-close{ background:none; border:none; font-size:20px; color: var(--ink-faint); line-height:1; padding:4px;}
.modal-close:hover{ color:var(--ink); }

/* ---------- Coach ---------- */
#coach-btn{
  position:fixed; bottom:24px; right:24px; z-index:90;
  width:58px; height:58px; border-radius:50%; background: var(--ink); color:var(--paper);
  border:none; display:flex; align-items:center; justify-content:center; font-size:24px;
  box-shadow: var(--shadow-lg);
}
#coach-btn:hover{ transform: scale(1.05); }
#coach-panel{
  position:fixed; bottom:96px; right:24px; z-index:91; width:380px; max-width:calc(100vw - 32px);
  height:min(560px, 70vh); background: var(--paper); border:1px solid var(--line); border-radius:18px;
  box-shadow: var(--shadow-lg); display:none; flex-direction:column; overflow:hidden;
}
#coach-panel.open{ display:flex; }
.coach-head{ padding:16px 18px; border-bottom:1px solid var(--line); background:var(--card); }
.coach-head select{ font-size:13px; padding:7px 10px; }
.coach-msgs{ flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:12px; }
.msg{ max-width:88%; font-size:13.8px; line-height:1.5; padding:10px 13px; border-radius:12px; white-space:pre-wrap; }
.msg.user{ align-self:flex-end; background: var(--ink); color: var(--paper); border-bottom-right-radius:3px; }
.msg.ai{ align-self:flex-start; background: var(--card); border:1px solid var(--line); border-bottom-left-radius:3px; }
.coach-input{ display:flex; gap:8px; padding:12px 14px; border-top:1px solid var(--line); background:var(--card); }
.coach-input input{ flex:1; }
.coach-input button{ background:var(--emerald); color:#fff; border:none; border-radius:10px; padding:0 14px; font-size:18px; }

/* toast */
#toast-wrap{ position:fixed; top:18px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center; }
.toast{
  background: var(--ink); color: var(--paper); padding:11px 20px; border-radius:999px; font-size:13.5px;
  box-shadow: var(--shadow-lg); display:flex; align-items:center; gap:8px; animation: toastIn .2s ease;
}
@keyframes toastIn{ from{opacity:0; transform: translateY(-8px);} to{opacity:1; transform:none;} }
.toast.badge{ background: var(--ochre); color:#26160a; }

/* misc */
.footer-nav{ display:flex; justify-content:space-between; align-items:center; margin-top:32px; padding-top:18px; border-top:1px solid var(--line); }
hr.line{ border:none; border-top:1px solid var(--line); margin:26px 0; }
.mono{ font-family:var(--font-mono); }
.muted{ color: var(--ink-faint); }
.small{ font-size:12.5px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-wrap"></div>

<button id="coach-btn" onclick="toggleCoach()" title="Ask your AI Design Thinking Coach">✦</button>
<div id="coach-panel"></div>

<script>
/* =========================================================
   THE AI DESIGN THINKING STUDIO — app logic
   Vanilla JS, single-file, in-memory + window.storage persistence
   ========================================================= */

const STAGES = [
  { id:'empathize', label:'Empathize', color:'var(--stage-empathize)', mission:'Understand the people you are designing for.' },
  { id:'define',    label:'Define',    color:'var(--stage-define)',    mission:'Frame the right problem to solve.' },
  { id:'ideate',    label:'Ideate',    color:'var(--stage-ideate)',    mission:'Generate a wide field of possible solutions.' },
  { id:'prototype', label:'Prototype', color:'var(--stage-prototype)', mission:'Make an idea tangible enough to react to.' },
  { id:'test',      label:'Test',      color:'var(--stage-test)',      mission:'Put your prototype in front of reality.' },
];

const COACH_PERSONAS = [
  { id:'facilitator', label:'Design Thinking Facilitator', sys:'You are an experienced Design Thinking facilitator in the style of Stanford d.school and IDEO. You are warm, socratic, and push teams toward user empathy.' },
  { id:'teacher', label:'Teacher', sys:'You are a patient teacher explaining Design Thinking concepts clearly and simply to someone with no prior experience, using short examples.' },
  { id:'consultant', label:'Innovation Consultant', sys:'You are a sharp innovation consultant from a top strategy firm. You give crisp, structured, actionable advice and reference relevant frameworks.' },
  { id:'investor', label:'Investor', sys:'You are a skeptical early-stage investor. You probe market size, business model viability, and differentiation. You are direct and unafraid to say an idea is weak.' },
  { id:'researcher', label:'UX Researcher', sys:'You are a rigorous UX researcher. You care about research validity, bias, sample size, and whether claims are actually grounded in evidence.' },
  { id:'pm', label:'Product Manager', sys:'You are a pragmatic product manager. You care about scope, prioritization, feasibility, and shipping something valuable soon.' },
  { id:'customer', label:'The Customer', sys:'You roleplay as a real, specific target customer reacting honestly to whatever the team shows you — in first person, with real feelings and objections.' },
  { id:'devil', label:"Devil's Advocate", sys:"You are a constructive devil's advocate. You find the weakest assumption in the team's thinking and challenge it directly, but respectfully, and suggest how to stress-test it." },
  { id:'agile', label:'Agile Coach', sys:'You are an agile coach focused on iteration speed, small experiments, and reducing cycle time between idea and learning.' },
  { id:'strategist', label:'Business Strategist', sys:'You are a business strategist focused on business model, revenue, competitive positioning, and long-term differentiation.' },
];

// ---- Generic template library ----
const TEMPLATES = [
  // EMPATHIZE
  { id:'persona', stage:'empathize', icon:'🧑', name:'Persona', blurb:'A composite sketch of your target user.',
    fields:[ {k:'name', l:'Persona name & role', t:'text', ph:'e.g. "Maya, 34, first-time small business owner"'},
             {k:'goals', l:'Goals & motivations', t:'textarea', ph:'What is this person trying to achieve?'},
             {k:'frustrations', l:'Frustrations & pain points', t:'textarea', ph:'What gets in their way today?'},
             {k:'context', l:'Context of use', t:'textarea', ph:'Where/when/how do they encounter this problem?'} ] },
  { id:'empathyMap', stage:'empathize', icon:'🗺️', name:'Empathy Map', blurb:'What the user says, thinks, does, and feels.',
    fields:[ {k:'says', l:'Says', t:'textarea'}, {k:'thinks', l:'Thinks', t:'textarea'}, {k:'does', l:'Does', t:'textarea'}, {k:'feels', l:'Feels', t:'textarea'} ] },
  { id:'customerJourney', stage:'empathize', icon:'🧭', name:'Customer Journey', blurb:'Steps, emotions and pain points across an experience.',
    fields:[ {k:'stages', l:'Journey stages', t:'textarea', ph:'e.g. Awareness → Research → Purchase → Onboarding → Use'},
             {k:'painpoints', l:'Pain points per stage', t:'textarea'}, {k:'emotions', l:'Emotional highs & lows', t:'textarea'} ] },
  { id:'stakeholderMap', stage:'empathize', icon:'🕸️', name:'Stakeholder Map', blurb:'Everyone who influences or is affected by the problem.',
    fields:[ {k:'stakeholders', l:'Key stakeholders', t:'textarea', ph:'List each stakeholder and their interest/influence'} ] },
  { id:'observationCanvas', stage:'empathize', icon:'👁️', name:'Observation Canvas', blurb:'What you noticed by watching people, not asking them.',
    fields:[ {k:'observed', l:'What did you observe?', t:'textarea'}, {k:'surprises', l:'Surprises / contradictions', t:'textarea'} ] },
  { id:'interviewGuide', stage:'empathize', icon:'🎙️', name:'Interview Guide', blurb:'Open questions for a customer conversation.',
    fields:[ {k:'topic', l:'Interview focus', t:'text'}, {k:'notes', l:'What you already suspect (to challenge)', t:'textarea'} ] },
  { id:'extremeUser', stage:'empathize', icon:'🌶️', name:'Extreme User', blurb:'A user at the far edge — reveals needs mainstream users hide.',
    fields:[ {k:'who', l:'Who is the extreme user?', t:'text', ph:'e.g. a power user, a total novice, someone with a disability'}, {k:'needs', l:'What unusual needs do they surface?', t:'textarea'} ] },
  { id:'userStory', stage:'empathize', icon:'📝', name:'User Story', blurb:'As a [user], I want [goal], so that [benefit].',
    fields:[ {k:'user', l:'As a...', t:'text'}, {k:'want', l:'I want...', t:'text'}, {k:'benefit', l:'So that...', t:'text'} ] },
  { id:'voc', stage:'empathize', icon:'💬', name:'Voice of Customer', blurb:'Direct quotes and language customers actually use.',
    fields:[ {k:'quotes', l:'Real or representative quotes', t:'textarea'} ] },
  { id:'jtbdEmpathize', stage:'empathize', icon:'🔧', name:'Jobs-To-Be-Done', blurb:'The "job" the customer is hiring your solution to do.',
    fields:[ {k:'job', l:'When [situation], I want to [motivation], so I can [outcome]', t:'textarea'} ] },

  // DEFINE
  { id:'problemStatement', stage:'define', icon:'🎯', name:'Problem Statement', blurb:'A clear, human statement of the problem.',
    fields:[ {k:'draft', l:'Draft problem statement', t:'textarea', ph:'[User] needs [need] because [insight].'} ] },
  { id:'pov', stage:'define', icon:'🔭', name:'POV Statement', blurb:'[User] needs [need] because [surprising insight].',
    fields:[ {k:'user', l:'User', t:'text'}, {k:'need', l:'Need', t:'text'}, {k:'insight', l:'Insight', t:'textarea'} ] },
  { id:'hmw', stage:'define', icon:'❓', name:'How Might We', blurb:'Reframe the problem as an open, optimistic question.',
    fields:[ {k:'seed', l:'Starting point (POV or problem)', t:'textarea'} ] },
  { id:'jtbdStatement', stage:'define', icon:'📌', name:'JTBD Statement', blurb:'A crisp jobs-to-be-done framing.',
    fields:[ {k:'draft', l:'Draft JTBD statement', t:'textarea'} ] },
  { id:'opportunityCanvas', stage:'define', icon:'🌱', name:'Opportunity Statement', blurb:'Where is the biggest opportunity for impact?',
    fields:[ {k:'draft', l:'Opportunity area', t:'textarea'} ] },

  // IDEATE
  { id:'aiIdeaGenerator', stage:'ideate', icon:'💡', name:'AI Idea Generator', blurb:'Ask AI to generate a batch of raw ideas fast.',
    fields:[ {k:'seed', l:'Seed prompt (problem / HMW)', t:'textarea'} ], special:'ideaGen' },
  { id:'scamper', stage:'ideate', icon:'🔀', name:'SCAMPER', blurb:'Substitute, Combine, Adapt, Modify, Put to other use, Eliminate, Reverse.',
    fields:[ {k:'base', l:'Idea or product to transform', t:'textarea'} ] },
  { id:'crazy8', stage:'ideate', icon:'8️⃣', name:'Crazy 8s', blurb:'8 ideas, fast, no filtering.',
    fields:[ {k:'ideas', l:'Your 8 quick ideas (one per line)', t:'textarea'} ] },
  { id:'mindMap', stage:'ideate', icon:'🧠', name:'Mind Map', blurb:'Branch outward from the core problem.',
    fields:[ {k:'center', l:'Central topic', t:'text'} ] },
  { id:'brainwriting', stage:'ideate', icon:'✍️', name:'Brainwriting 6-3-5', blurb:'Silent, written idea building in rounds.',
    fields:[ {k:'seed', l:'Starting ideas', t:'textarea'} ] },
  { id:'lotusBlossom', stage:'ideate', icon:'🪷', name:'Lotus Blossom', blurb:'Expand one idea into 8 related directions, then again.',
    fields:[ {k:'core', l:'Core idea', t:'text'} ] },
  { id:'triz', stage:'ideate', icon:'⚙️', name:'TRIZ', blurb:'Systematic inventive problem solving — resolve contradictions.',
    fields:[ {k:'contradiction', l:'What contradiction are you facing?', t:'textarea', ph:'e.g. "We want it more powerful but also simpler"'} ] },
  { id:'reverseThinking', stage:'ideate', icon:'🔁', name:'Reverse Thinking', blurb:'How would you make this problem worse? Then invert.',

function toast(msg, isBadge){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast' + (isBadge? ' badge':'');
  el.innerHTML = (isBadge? '🏅 ':'✦ ') + msg;
  wrap.appendChild(el);

}

function checkBadges(){
  const thresholds = [ [30,'Explorer'], [90,'Momentum Builder'], [180,'Innovator'], [300,'Visionary'], [420,'Master Facilitator'] ];
  thresholds.forEach(([xp,name])=>{
    if(state.xp>=xp && !state.badges.includes(name)){
      state.badges.push(name);
      toast('Badge earned: '+name, true);
    }
  });
  STAGES.forEach(s=>{
    const doneInStage = Object.keys(state.outputs).filter(id=> templateById(id).stage===s.id).length;
    const badgeName = 'First insight — '+s.label;
    if(doneInStage>=1 && !state.badges.includes(badgeName)){
      state.badges.push(badgeName);
      toast('Badge earned: '+badgeName, true);
    }
  });
}

function templateById(id){ return TEMPLATES.find(t=>t.id===id); }
function templatesForStage(stageId){ return TEMPLATES.filter(t=>t.stage===stageId); }

function stageCompletionCount(stageId){
  return templatesForStage(stageId).filter(t=> state.outputs[t.id]).length;
}
function overallProgress(){
  const total = TEMPLATES.length;
  const done = Object.keys(state.outputs).length;
  return { done, total, pct: Math.round((done/total)*100) };
}
function stageIndex(id){ return STAGES.findIndex(s=>s.id===id); }
function isStageUnlocked(stageId){
  const idx = stageIndex(stageId);
  if(idx===0) return true;
  const prev = STAGES[idx-1];
  return stageCompletionCount(prev.id) >= 1; // unlock after at least one artifact in prior stage
}

// ---------------- CLAUDE API ----------------
async function callClaude(system, user, opts){
  opts = opts || {};
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens: opts.maxTokens || 1000,
        system: system,
        messages:[ { role:'user', content: user } ]
      })
    });
    const data = await res.json();
    if(data && data.content){
      const text = data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
      return text || '(No response text returned.)';
    }
    if(data && data.error){ return 'AI error: '+(data.error.message||'unknown error'); }
    return '(Unexpected response from AI.)';
  }catch(e){
    return 'The AI Coach could not be reached right now. ('+e.message+')';
  }
}

function projectContextSummary(){
  if(!state.project) return 'No project context yet.';
  const p = state.project;
  return `Team "${p.teamName}" at ${p.organization||'an organization'} in the ${p.industry||'unspecified'} industry (${p.country||'unspecified country'}). `+
    `Innovation type(s): ${(p.innovationTypes && p.innovationTypes.length) ? p.innovationTypes.join(', ') : 'unspecified'}. Challenge: ${p.challenge}. Target customer: ${p.targetCustomer}. `+
    `Business goal: ${p.businessGoal}. Expected outcome: ${p.expectedOutcome}. Duration: ${p.duration||'unspecified'}.`;
}

function connectedInsights(currentStageId, excludeId){
  // pick up to 4 most relevant prior outputs to feed as context (the "knowledge graph")
  const order = STAGES.map(s=>s.id);
  const curIdx = order.indexOf(currentStageId);
  const priorStages = order.slice(0, curIdx+1);
  const items = Object.entries(state.outputs)
    .filter(([id])=> id!==excludeId)
    .filter(([id])=> priorStages.includes(templateById(id).stage))
    .slice(-6);
  if(items.length===0) return { text:'None yet.', chips:[] };
  const chips = items.map(([id,o])=> templateById(id).name);
  const text = items.map(([id,o])=>{
    const t = templateById(id);
    const fieldSummary = Object.values(o.fields||{}).filter(Boolean).join(' | ').slice(0,180);
    return `- ${t.name}: ${fieldSummary || '(ai-generated)'}`;
  }).join('\n');
  return { text, chips };
}

// Field ids on the Mission Control form, used to snapshot/restore draft answers

const MISSION_FIELD_KEYS = ['teamName','organization','industry','country','challenge','targetCustomer','businessGoal','expectedOutcome','duration','teamMembers'];

function collectMissionDraft(){
  const draft = {};
  MISSION_FIELD_KEYS.forEach(key=>{
    const el = document.getElementById('m_'+key);
    if(el) draft[key] = el.value;
  });
  return draft;
}

function selectInnovationType(t){
  if(!state.project) state.project = {};
  // Preserve whatever the team has already typed on this page before re-rendering it.
  Object.assign(state.project, collectMissionDraft());
  const types = new Set(state.project.innovationTypes || []);
  if(types.has(t)) types.delete(t); else types.add(t);
  state.project.innovationTypes = Array.from(types);
  render();
}

function saveMissionAndLaunch(){
  const draft = collectMissionDraft();
  const proj = Object.assign({}, state.project, draft, {
    teamName: draft.teamName || (state.project && state.project.teamName) || 'Untitled Team',
    innovationTypes: (state.project && state.project.innovationTypes && state.project.innovationTypes.length)
      ? state.project.innovationTypes

  addJournal('mission','Mission Control set up', proj.teamName+' — '+proj.challenge);
  state.screen='stage';
  state.activeStage='empathize';

  render();

function renderTrailbar(){
  const w = 1000, pad=40, n=STAGES.length;
  const step = (w-2*pad)/(n-1);
  const points = STAGES.map((s,i)=>({x: pad+i*step, y: i%2===0?54:26, s}));
  const path = points.map((p,i)=> (i===0?'M':'L')+p.x+' '+p.y).join(' ');
  return `
  <div class="trailbar">
    <svg class="trail-svg" viewBox="0 0 ${w} 84" xmlns="http://www.w3.org/2000/svg">
      <path d="${path}" stroke="rgba(27,38,32,0.2)" stroke-width="2" fill="none" stroke-dasharray="1 7" stroke-linecap="round"/>
      ${points.map(p=>{
        const done = stageCompletionCount(p.s.id);
        const total = templatesForStage(p.s.id).length;
        const unlocked = isStageUnlocked(p.s.id);
        const active = p.s.id===state.activeStage;
        const fill = unlocked ? p.s.color : '#B9BFAE';
        return `<g style="cursor:${unlocked?'pointer':'not-allowed'}" onclick="${unlocked? `setActiveStage('${p.s.id}')`:''}">
          <circle cx="${p.x}" cy="${p.y}" r="${active?15:11}" fill="${fill}" opacity="${active?1:0.85}"/>
          ${active? `<circle cx="${p.x}" cy="${p.y}" r="21" fill="${fill}" opacity="0.16"/>`:''}
          <text x="${p.x}" y="${p.y+34}" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" fill="${active?'#1B2620':'#7A8278'}">${p.s.label}</text>
          <text x="${p.x}" y="${p.y+4}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#fff">${done}/${total}</text>
        </g>`;
      }).join('')}
    </svg>
  </div>`;
}

  }

function collectFieldValues(t){

async function requestAiHelp(id, flag){
  const t = templateById(id);
  const fields = collectFieldValues(t);
  const insights = connectedInsights(t.stage, t.id);
  aiLoading = true;
  renderTemplateModal();

  let system = `You are the AI Coach inside a Design Thinking studio app, currently helping with the "${t.name}" template (${t.blurb}) during the ${t.stage.toUpperCase()} stage. `+
    `Project context: ${projectContextSummary()} Prior connected outputs from earlier stages:\n${insights.text}\n`+
    `Be concrete, specific to this project's industry and challenge, and concise (under 220 words). Use short bullet points where useful. Do not use markdown headers.`;
  let user = `Here is what the team has filled in so far for this template:\n`+
    Object.entries(fields).map(([k,v])=> `${k}: ${v||'(empty)'}`).join('\n')+
    `\n\nHelp the team complete this template well. If fields are empty, propose a strong concrete draft. If filled, critique and sharpen it.`;

  if(t.special==='ideaGen'){
    const seedEl = document.getElementById('tf_seed');
    const seed = seedEl ? seedEl.value : '';
    if(flag==='count=20' || flag==='count=50'){
      const n = flag==='count=20'? 20:50;
      user = `Seed prompt: ${seed || projectContextSummary()}\n\nGenerate ${n} short, punchy, distinct raw ideas as a numbered list (a few words each, no explanations). Push for range: some obvious, some wild, some cheap, some ambitious.`;
      system += ` Return ONLY the numbered list, nothing else.`;
    } else if(flag==='cluster=1'){
      const existingAi = (state.outputs[id]&&state.outputs[id].ai) || '';
      user = `Here is a raw idea list:\n${existingAi || seed}\n\nGroup these into 4-6 named clusters (themes), remove near-duplicates, and flag the 2-3 most disruptive or promising ideas with a ⭐.`;
    }
  }
  if(t.special==='devPrompt'){
    const toolEl = document.getElementById('tf_tool');
    const tool = toolEl ? toolEl.value : 'Claude';
    user = `Write a ready-to-paste development prompt for the AI coding tool "${tool}" that would let a developer quickly build a functional prototype of: ${fields.scope || projectContextSummary()}. `+
      `Include: goal, target users, core screens/flows, key features (MVP scope only), tech suggestions, and constraints. Format as a single prompt block the user can copy directly into ${tool}.`;
  }
  if(t.special==='pivotCall'){
    const resultsEl = document.getElementById('tf_results');
    const results = resultsEl? resultsEl.value : '';
    user = `Testing results / what the team learned: ${results || '(not yet described)'}\n\nBased on this and the project context, give a clear recommendation: Pivot, Persevere, Improve, or Restart — with a one-line reason — then suggest one concrete next iteration step.`;
  }

  const text = await callClaude(system, user, {maxTokens: (flag==='count=50'?1400: 900)});
  aiLoading = false;
  if(!state.outputs[id]) state.outputs[id] = { fields:{}, ai:'' };
  state.outputs[id].ai = text;
  renderTemplateModal();
}

function saveTemplate(id){
  const t = templateById(id);
  const fields = collectFieldValues(t);
  const wasNew = !state.outputs[id];
  const ai = (state.outputs[id] && state.outputs[id].ai) || '';
  state.outputs[id] = { fields, ai, ts: new Date().toISOString() };
  if(wasNew){
    state.xp += xpForCompletion();
    addJournal('template', t.name+' ('+t.stage+')', Object.values(fields).filter(Boolean).join(' | '));
    checkBadges();
    toast('+15 XP — '+t.name+' saved to your journey');
  } else {
    addJournal('template-update', t.name+' updated ('+t.stage+')', Object.values(fields).filter(Boolean).join(' | '));
    toast(t.name+' updated');
  }
  persist();
  closeTemplate();
  render();
}

// ---- Single source of truth for everything that goes into a download ----
function collectProjectData(){
  const outputsByStage = {};
  STAGES.forEach(s=>{
    outputsByStage[s.id] = templatesForStage(s.id).map(t=>({
      id: t.id,
      name: t.name,
      completed: !!state.outputs[t.id],
      fields: (state.outputs[t.id] && state.outputs[t.id].fields) || {},
      ai: (state.outputs[t.id] && state.outputs[t.id].ai) || '',
      ts: (state.outputs[t.id] && state.outputs[t.id].ts) || null,
    }));
  });
  return {
    mission: state.project || null,
    xp: state.xp,
    badges: state.badges.slice(),
    outputsByStage,
    coachHistory: state.coach.history.slice(),
    journal: state.journal.slice(),
    progress: overallProgress(),
  };
}

function hasAnyProjectData(data){
  if(!data.mission) return false;
  return true; // a mission/project exists once Mission Control has been saved
}

const NOT_DONE = 'Not completed yet.';

function fmtBanner(title){ return '='.repeat(58)+'\n'+title+'\n'+'='.repeat(58)+'\n'; }
function fmtSection(title){ return '\n'+title+'\n'+'-'.repeat(title.length)+'\n'; }

function fieldsBlock(fields){
  const entries = Object.entries(fields||{}).filter(([,v])=>v);
  if(entries.length===0) return NOT_DONE+'\n';
  return entries.map(([k,v])=>'  '+k+': '+v).join('\n')+'\n';
}

function stageTextBlock(data, stageId){
  const stage = STAGES.find(s=>s.id===stageId);
  let out = fmtBanner('STEP '+(stageIndex(stageId)+1)+' — '+stage.label.toUpperCase());
  const tpls = data.outputsByStage[stageId];
  const completed = tpls.filter(t=>t.completed);
  if(completed.length===0){
    out += '\n'+NOT_DONE+'\n';
    return out;
  }
  completed.forEach(t=>{
    out += fmtSection(t.name);
    out += fieldsBlock(t.fields);
    if(t.ai){
      out += '\nAI Coach Feedback\n-----------------\n';
      out += t.ai+'\n';
    }
  });
  return out;
}

function finalReflectionBlock(data){
  let out = fmtBanner('FINAL REFLECTION');
  const doneCount = data.progress.done;
  const totalCount = data.progress.total;
  out += '\nInnovation score: '+doneCount+'/'+totalCount+' artifacts completed ('+data.progress.pct+'%). '+data.xp+' XP earned, '+data.badges.length+' badge(s) unlocked.\n';
  out += '\nBadges earned\n-------------\n';
  out += (data.badges.length? data.badges.join(', ') : NOT_DONE) + '\n';

  const testOutputs = data.outputsByStage.test.filter(t=>t.completed);
  out += '\nLessons learned (from Test stage)\n---------------------------------\n';
  if(testOutputs.length===0) out += NOT_DONE+'\n';
  else testOutputs.forEach(t=>{ if(t.ai) out += '['+t.name+'] '+t.ai+'\n\n'; });

  out += 'AI coaching summary\n--------------------\n';
  if(data.coachHistory.length===0) out += NOT_DONE+'\n';
  else{
    const aiTurns = data.coachHistory.filter(m=>m.role==='assistant');
    out += (aiTurns.length? aiTurns.slice(-3).map(m=>'- '+m.text).join('\n') : NOT_DONE)+'\n';
  }
  return out;
}

function buildFullReportText(){
  const data = collectProjectData();
  const p = data.mission || {};
  let out = '';
  out += fmtBanner('THE AI DESIGN THINKING STUDIO\nCOMPLETE DESIGN THINKING REPORT');

  out += fmtSection('Project Information');
  out += 'Team Name: '+(p.teamName||NOT_DONE)+'\n';
  out += 'Company / Organization: '+(p.organization||NOT_DONE)+'\n';
  out += 'Industry: '+(p.industry||NOT_DONE)+'\n';
  out += 'Country: '+(p.country||NOT_DONE)+'\n';
  out += 'Innovation Type(s): '+((p.innovationTypes && p.innovationTypes.length) ? p.innovationTypes.join(', ') : NOT_DONE)+'\n';
  out += 'Innovation / Business Goal: '+(p.businessGoal||NOT_DONE)+'\n';
  out += 'Business Challenge: '+(p.challenge||NOT_DONE)+'\n';
  out += 'Target Users / Customer: '+(p.targetCustomer||NOT_DONE)+'\n';
  out += 'Expected Outcome: '+(p.expectedOutcome||NOT_DONE)+'\n';
  out += 'Duration: '+(p.duration||NOT_DONE)+'\n';
  out += 'Team Members: '+(p.teamMembers||NOT_DONE)+'\n';

  STAGES.forEach(s=>{ out += '\n'+stageTextBlock(data, s.id); });

  out += '\n'+fmtBanner('AI COACH CONVERSATION LOG');
  if(data.coachHistory.length===0) out += '\n'+NOT_DONE+'\n';
  else out += '\n'+data.coachHistory.map(m=>(m.role==='user'?'Team: ':'AI Coach: ')+m.text).join('\n')+'\n';

  out += '\n'+fmtBanner('CHRONOLOGICAL JOURNAL');
  if(data.journal.length===0) out += '\n'+NOT_DONE+'\n';
  else out += '\n'+data.journal.map(j=>'['+j.ts+'] '+j.type+' — '+j.label+(j.detail? (': '+j.detail):'')).join('\n')+'\n';

  out += '\n'+finalReflectionBlock(data);

  out += '\n'+'='.repeat(58)+'\n';
  out += 'Generated by The AI Design Thinking Studio.\nPresentation-ready and reusable as input for further AI-assisted development.\n';
  return out;
}

function buildExecSummaryText(){
  const data = collectProjectData();
  const p = data.mission || {};

  const defineOut = data.outputsByStage.define.find(t=>t.completed && (t.id==='problemStatement'||t.id==='pov'));
  const ideateOut = data.outputsByStage.ideate.filter(t=>t.completed);
  const testOut = data.outputsByStage.test.filter(t=>t.completed);

  let out = fmtBanner('EXECUTIVE SUMMARY');
  out += fmtSection('Challenge');
  out += (p.challenge || NOT_DONE) + '\n';

  out += fmtSection('Opportunity');
  const oppOut = data.outputsByStage.define.find(t=>t.id==='opportunityCanvas' && t.completed);
  out += (oppOut ? (fieldsBlock(oppOut.fields)+(oppOut.ai? oppOut.ai+'\n':'')) : NOT_DONE+'\n');

  out += fmtSection('Target Users');
  out += (p.targetCustomer || NOT_DONE) + '\n';

  out += fmtSection('Proposed Solution');
  const protoOut = data.outputsByStage.prototype.filter(t=>t.completed);
  out += protoOut.length ? protoOut.map(t=>'- '+t.name+(t.ai? ': '+t.ai.split('\n')[0]:'')).join('\n')+'\n' : NOT_DONE+'\n';

  out += fmtSection('Key Innovation');
  out += ideateOut.length ? ('Selected/AI-recommended directions from: '+ideateOut.map(t=>t.name).join(', ')+'\n') : NOT_DONE+'\n';

  out += fmtSection('Expected Value');
  out += (p.expectedOutcome || NOT_DONE) + '\n';

  out += fmtSection('Business Impact');
  out += (p.businessGoal || NOT_DONE) + '\n';

  out += fmtSection('Recommended Next Steps');
  const validationOut = data.outputsByStage.test.find(t=>t.id==='validationPlan' && t.completed);
  out += validationOut ? (fieldsBlock(validationOut.fields)+(validationOut.ai? validationOut.ai+'\n':'')) : (testOut.length? 'Continue validating open assumptions before scaling.\n' : NOT_DONE+'\n');

  out += fmtSection('Progress Snapshot');
  out += data.progress.done+'/'+data.progress.total+' artifacts completed · '+data.xp+' XP · '+data.badges.length+' badge(s)\n';

  return out;
}

function buildInnovationJourneyText(){
  const data = collectProjectData();
  const milestones = [
    { key:'mission', label:'Mission Started' },
    { key:'empathize', label:'Empathy Research' },
    { key:'define', label:'Problem Discovery' },
    { key:'ideate', label:'Idea Generation' },
    { key:'prototype', label:'Prototype' },
    { key:'test', label:'Testing' },
  ];
  let out = fmtBanner('INNOVATION JOURNEY');
  out += '\n'+milestones.map(m=>m.label).join('\n   ↓\n')+'\n   ↓\nFinal Solution\n';

  out += '\n'+fmtSection('Milestone detail');
  out += 'Mission Started: '+(data.mission? (data.mission.teamName+' — '+(data.mission.challenge||NOT_DONE)) : NOT_DONE)+'\n\n';
  STAGES.forEach(s=>{
    const done = data.outputsByStage[s.id].filter(t=>t.completed);
    out += s.label+': ';
    out += done.length ? done.map(t=>t.name).join(', ') : NOT_DONE;
    out += '\n';
  });

  out += '\n'+fmtSection('Key decisions & AI coaching highlights');
  const highlights = data.journal.filter(j=>j.type==='template' || j.type==='coach');
  out += highlights.length ? highlights.map(j=>'['+j.ts+'] '+j.label+(j.detail? (' — '+j.detail):'')).join('\n')+'\n' : NOT_DONE+'\n';

  out += '\n'+fmtSection('Chronological log');
  out += data.journal.length ? data.journal.map(j=>'['+j.ts+'] '+j.label).join('\n')+'\n' : NOT_DONE+'\n';

  return out;
}

// ---- Universal, reusable download helper ----
function downloadTextFile(filename, content){
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.style.display = 'none';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  // Delay revoking the object URL so Safari/webviews have time to start the download.
  setTimeout(()=> URL.revokeObjectURL(url), 1000);
}

const REPORT_KINDS = {
  full:    { filename:'Complete_Design_Thinking_Report.txt', label:'Complete Design Thinking Report', build: buildFullReportText },
  exec:    { filename:'Executive_Summary.txt',                label:'Executive Summary',               build: buildExecSummaryText },
  journey: { filename:'Innovation_Journey.txt',                label:'Innovation Journey',              build: buildInnovationJourneyText },
};

function downloadReport(kind){
  const spec = REPORT_KINDS[kind];
  if(!spec){ console.error('Unknown report kind:', kind); return; }

  const data = collectProjectData();
  if(!hasAnyProjectData(data)){
    toast('No project data available to download.');
    return;
  }

  let content;
  try{
    content = spec.build();
  }catch(e){
    console.error('Report generation failed for', kind, e);
    toast('Something went wrong generating that file — please try again.');
    return;
  }

  try{
    downloadTextFile(spec.filename, content);
    toast('✅ '+spec.label+' downloaded successfully.');
  }catch(e){
    console.error('Download failed for', kind, e);
    toast('Download failed — your browser may be blocking it.');
  }
}

function setCoachPersona(id){ state.coach.persona = id; renderCoachPanel(); }

let coachThinking = false;
async function sendCoachMessage(){
  const box = document.getElementById('coach-input-box');
  const text = box.value.trim();
  if(!text || coachThinking) return;
  state.coach.history.push({role:'user', text});
  box.value='';
  coachThinking = true;
  renderCoachPanel();

  const persona = COACH_PERSONAS.find(p=>p.id===state.coach.persona);
  const system = persona.sys + ` You are inside The AI Design Thinking Studio app. Project context: ${projectContextSummary()} `+
    `Keep replies conversational and under 150 words unless asked for more.`;
  const reply = await callClaude(system, text, {maxTokens:600});
  state.coach.history.push({role:'assistant', text:reply});
  coachThinking = false;
  addJournal('coach','Coach chat ('+persona.label+')', text.slice(0,100));
  persist();
  renderCoachPanel();
}
